<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./style/reset.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="./style/style.css">
        <title>Port Russell</title>
    </head>
    <body>
        <header class="text-center mb-5">
            <h1 class="mb-4">Port de plaisance Russell</h1>
            <p>Bienvenue sur le site du port de plaisance Russell.</p>
            <p>
                Il vous sera possible de créer, consulter, mettre à jour et
                supprimer les utilisateurs, les catways et les réservations.
            </p>
        </header>
        <main>
            <!-- Login Form Section -->
            <div class="container px-0 text-center">
                <form id="login-form" class="w-50 min-vh-50 shadow-lg border border-3 rounded-3 shadow align-content-center mx-auto">

                    <!-- Email Input -->
                    <div class="col-6 mx-auto">
                        <label for="email" class="visually-hidden">Email</label>
                        <input type="text" class="form-control" id="email" name="email" 
                        
                        placeholder="Adresse email"></input>
                    </div>

                    <!-- Password Input -->
                    <div class="col-6 mx-auto my-4">
                        <label for="password" class="visually-hidden">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Mot de passe"></input>
                    </div>

                    <!-- Submit Button -->
                    <div class="col-4 mx-auto">
                        <button type="submit" class="btn btn-primary mb-3">Connexion</button>
                    </div>

                    <!-- Documentation Link -->
                    <div class="container pt-3 text-end">
                        <a id='readme' href='https://portrussell-api.onrender.com/docs' target='_blank' rel="noopener noreferrer">Docs</a>
                    </div>
                </form>
                
            </div>
        </main>
        <script src="./src/config.js" type="module"></script>
        <script src="./js/login.js" type="module"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
